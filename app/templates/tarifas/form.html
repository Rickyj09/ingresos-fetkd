{% extends "base.html" %}
{% block title %}Tarifa{% endblock %}
{% block content %}

<div class="container mt-4">
  <div class="mb-4">
    <h1 class="mb-2">{% if tarifa %}Editar Tarifa{% else %}Nueva Tarifa{% endif %}</h1>
    <p class="text-muted mb-0">Evento: {{ evento.anio }} - {{ evento.nombre }}</p>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label">Nombre *</label>
            <input type="text"
                   name="nombre"
                   class="form-control"
                   value="{{ tarifa.nombre if tarifa else '' }}"
                   required>
          </div>

          <div class="col-md-4 d-flex align-items-center pt-4">
            <div class="form-check">
              <input class="form-check-input"
                     type="checkbox"
                     name="activo"
                     id="activo"
                     {% if tarifa %}
                       {% if tarifa.activo %}checked{% endif %}
                     {% else %}
                       checked
                     {% endif %}>
              <label class="form-check-label" for="activo">Tarifa activa</label>
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label">Descripción</label>
            <textarea name="descripcion"
                      class="form-control"
                      rows="4">{{ tarifa.descripcion if tarifa else '' }}</textarea>
          </div>

          <div class="col-md-4">
            <label class="form-label">Costo *</label>
            <input type="number"
                   step="0.01"
                   min="0"
                   name="valor"
                   class="form-control"
                   value="{{ tarifa.valor if tarifa else '0.00' }}"
                   required>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <a href="{{ url_for('tarifas.index', evento_id=evento.id) }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}

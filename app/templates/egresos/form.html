{% extends "base.html" %}
{% block title %}{% if item %}Editar Egreso{% else %}Nuevo Egreso{% endif %}{% endblock %}
{% block content %}

<h3>{% if item %}Editar Egreso{% else %}Nuevo Egreso{% endif %}</h3>

<form method="post" class="card shadow-sm">
  <div class="card-body">
    <div class="row g-3">

      <div class="col-md-6">
        <label class="form-label">Evento *</label>
        <select class="form-select" name="evento_id" required>
          <option value="">-- Seleccione --</option>
          {% for e in eventos %}
            <option value="{{ e.id }}" {% if item and item.evento_id == e.id %}selected{% endif %}>
              {{ e.anio }} - {{ e.nombre }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Rubro de egreso *</label>
        <select class="form-select" name="rubro_egreso_id" required>
          <option value="">-- Seleccione --</option>
          {% for r in rubros %}
            <option value="{{ r.id }}" {% if item and item.rubro_egreso_id == r.id %}selected{% endif %}>
              {{ r.nombre }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label">Fecha *</label>
        <input type="date" class="form-control" name="fecha"
               value="{{ item.fecha.strftime('%Y-%m-%d') if item and item.fecha else '' }}" required>
      </div>

      <div class="col-md-3">
        <label class="form-label">Valor *</label>
        <input type="number" step="0.01" min="0" class="form-control" name="valor"
               value="{{ item.valor if item else '' }}" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Proveedor</label>
        <input class="form-control" name="proveedor" value="{{ item.proveedor if item else '' }}">
      </div>

      <div class="col-md-8">
        <label class="form-label">Descripción *</label>
        <input class="form-control" name="descripcion" value="{{ item.descripcion if item else '' }}" required>
      </div>

      <div class="col-md-4">
        <label class="form-label">N° Comprobante</label>
        <input class="form-control" name="numero_comprobante" value="{{ item.numero_comprobante if item else '' }}">
      </div>

      <div class="col-12">
        <label class="form-label">Observación</label>
        <input class="form-control" name="observacion" value="{{ item.observacion if item else '' }}">
      </div>

    </div>

    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('egresos.index') }}" class="btn btn-outline-dark">Cancelar</a>
    </div>
  </div>
</form>

{% endblock %}
